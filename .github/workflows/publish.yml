name: Quarto Publish and Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Install Python dependencies via Conda & Pip
        run: |
          conda install -n r-reticulate numpy pandas scipy matplotlib statsmodels scikit-learn plotnine pip -y
          conda run -n r-reticulate python -m pip install --upgrade pip
          conda run -n r-reticulate python -m pip install pylahman pandas-nhanes siuba
          conda run -n r-reticulate python -c "import pylahman; print('pylahman OK')"
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("reticulate", "knitr", "rmarkdown", "tidyverse", "mdsr", "babynames", "Lahman", "NHANES", "patchwork", "mosaicData", "mosaic", "broom", "MASS"))
        shell: Rscript {0}

      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          conda activate r-reticulate
          export RETICULATE_PYTHON=$(conda info --base)/envs/r-reticulate/bin/python

          cp README.md index.md

          quarto render index.md --to html
          quarto render hw03.qmd --to html
          quarto render hw03.qmd --to ipynb

          mkdir -p _site
          cp index.html hw03.html hw03.ipynb _site/
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/snu-stat/hw3-2-dori1220-my-r-env:latest